// build.gradle for the Android library module (react-native-your-unified-player/android/build.gradle)

apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply plugin: "com.facebook.react" // Apply React Native Gradle plugin

// Helper function to get extension properties from root project or defaults
def getExtOrDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["YourUnifiedPlayer_" + name]
}

// Helper function to get extension properties as Integer or default
def getExtOrIntegerDefault(name) {
  def value = rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["YourUnifiedPlayer_" + name]
  return value != null ? value.toInteger() : 0
}

// Function to check namespace support
def supportsNamespace() {
  def parsed = com.android.Version.ANDROID_GRADLE_PLUGIN_VERSION.tokenize('.')
  def major = parsed[0].toInteger()
  def minor = parsed[1].toInteger()
  return (major == 7 && minor >= 3) || major >= 8
}

android {
  if (supportsNamespace()) {
    namespace "com.yourunifiedplayer"
  }

  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")
    buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", "true"
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lintOptions {
    disable "GradleCompatible"
    abortOnError false
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  kotlinOptions {
      jvmTarget = "1.8"
  }

  externalNativeBuild {
      cmake {
          path "src/main/jni/CMakeLists.txt"
      }
  }
}

repositories {
  // Inherit from root project is best practice, but ensure these are accessible
  mavenCentral()
  google()
}

// Get Kotlin version using helper
def kotlin_version = getExtOrDefault("kotlinVersion")

dependencies {
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"

  // ExoPlayer dependencies (for MP4)
  implementation 'androidx.media3:media3-exoplayer:1.3.0' // Example version, use latest stable
  implementation 'androidx.media3:media3-ui:1.3.0'      // Example version, use latest stable

  // --- UPDATED: WebRTC dependency using webrtc-sdk/android via JitPack ---
  // REMOVED: implementation 'org.webrtc:google-webrtc:...'

  // ADDED: Dependency for the specified SDK via JitPack (ASSUMPTION!)
  // Replace 'latest-tag-or-commit' with a specific release tag (e.g., 'v1.2.3') or commit hash from the GitHub repo.
  // Verify the exact coordinates from the SDK's documentation.
  // Ensure maven { url 'https://www.jitpack.io' } is in your root build.gradle repositories block.
  implementation 'io.github.webrtc-sdk:android:125.6422.07' // <-- ASSUMED COORDINATES - VERIFY!

}

// React Native Codegen configuration
react {
    jsRootDir = file("../js/")
    libraryName = "YourUnifiedPlayerSpec"
    codegenJavaPackageName = "com.yourunifiedplayer"
}
