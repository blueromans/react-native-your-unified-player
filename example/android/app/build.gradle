// buildscript block is usually NOT needed in app/build.gradle
// It belongs in the root android/build.gradle

// Apply necessary plugins for an Android Application module
apply plugin: "com.android.application" // <-- Apply application plugin
apply plugin: "kotlin-android" // Apply Kotlin if using it in the app module
apply plugin: "com.facebook.react" // Apply React Native plugin

/**
 * This clinician is generated by react-native-gradle-plugin
 * See https://github.com/facebook/react-native/blob/main/packages/react-native-gradle-plugin/src/main/kotlin/com/facebook/react/tasks/GenerateCodegenArtifactsTask.kt
 */
// apply from: new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), "../react.gradle")
// The line above is often replaced by the com.facebook.react plugin

// --- ADDED: android { ... } block ---
android {
    // ---> ADDED: namespace declaration <---
    // Replace with your actual unique application identifier
    namespace "com.yourunifiedplayer.example"

    // Use versions defined in the root project's ext block
    compileSdkVersion rootProject.ext.compileSdkVersion

    defaultConfig {
        // ApplicationId usually matches namespace
        applicationId "com.yourunifiedplayer.example"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        // Add other necessary defaultConfig settings
        // missingDimensionStrategy "react-native-camera", "general" // Example if needed by other libs
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore') // Default debug keystore setup
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        // Add release signing config here
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug // Use debug signing config
        }
        release {
            // signingConfig signingConfigs.release // Use release signing config
            minifyEnabled false // Or true for release builds
            // proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    // Set Java compatibility options
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    // Set Kotlin JVM target
    kotlinOptions {
        jvmTarget = "1.8"
    }
}

// Define dependencies for the application module
dependencies {
    // React Native dependencies (usually included by react.gradle or RN plugin)
    implementation "com.facebook.react:react-android"

    // --- ADDED: Dependency on your library module ---
    // This links your app to the native library you are building
    // Ensure the path ':react-native-your-unified-player' matches your library's module name/path
    implementation project(":react-native-your-unified-player")

    // Kotlin standard library (if using Kotlin in the app module)
    implementation "org.jetbrains.kotlin:kotlin-stdlib:${rootProject.ext.kotlinVersion}"

    // Add other app-specific dependencies here...
    // implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.1.0" // Example

    // Dependencies for React Native Fabric/New Architecture (usually handled by RN plugin)
    // if (isNewArchitectureEnabled()) {
    //    implementation("com.facebook.react:react-android-newarchitecture:$reactNativeVersion")
    // }

}

